<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0f172a"/>
  
  <!-- Golf Ball -->
  <circle cx="256" cy="220" r="80" fill="#ffffff"/>
  <circle cx="240" cy="205" r="4" fill="#e2e8f0"/>
  <circle cx="260" cy="210" r="3" fill="#e2e8f0"/>
  <circle cx="250" cy="225" r="3" fill="#e2e8f0"/>
  <circle cx="270" cy="220" r="4" fill="#e2e8f0"/>
  <circle cx="255" cy="235" r="3" fill="#e2e8f0"/>
  <circle cx="265" cy="240" r="3" fill="#e2e8f0"/>
  
  <!-- Golf Flag -->
  <line x1="256" y1="300" x2="256" y2="420" stroke="#22c55e" stroke-width="8" stroke-linecap="round"/>
  <polygon points="256,300 340,330 256,360" fill="#22c55e"/>
  
  <!-- Accent Glow -->
  <circle cx="256" cy="220" r="100" stroke="#22c55e" stroke-width="2" fill="none" opacity="0.3"/>
</svg>
