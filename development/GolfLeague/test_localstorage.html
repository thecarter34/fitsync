<!doctype html>
<html>
  <head>
    <title>LocalStorage Test</title>
  </head>
  <body>
    <h1>LocalStorage Test for Match Entry</h1>
    <div>
      <button onclick="testSave()">Test Save</button>
      <button onclick="testLoad()">Test Load</button>
      <button onclick="testClear()">Test Clear</button>
      <button onclick="testAll()">Test All</button>
    </div>
    <pre id="output"></pre>

    <script>
      function log(msg) {
        document.getElementById("output").textContent += msg + "\n";
        console.log(msg);
      }

      function testSave() {
        const matchId = "test-match-123";
        const scores = {
          team1_player1_scores: { 1: 4, 2: 5, 3: 6 },
          team1_player2_scores: { 1: 4, 2: 5, 3: 6 },
          team2_player1_scores: { 1: 4, 2: 5, 3: 6 },
          team2_player2_scores: { 1: 4, 2: 5, 3: 6 },
        };
        const key = `golf_league_draft_${matchId}`;
        const data = {
          matchId: matchId,
          timestamp: Date.now(),
          scores: scores,
        };
        localStorage.setItem(key, JSON.stringify(data));
        log("✅ Saved to localStorage with key: " + key);
        log("Data: " + JSON.stringify(data, null, 2));
      }

      function testLoad() {
        const matchId = "test-match-123";
        const key = `golf_league_draft_${matchId}`;
        const saved = localStorage.getItem(key);
        if (saved) {
          const data = JSON.parse(saved);
          log("✅ Loaded from localStorage:");
          log("Key: " + key);
          log("Data: " + JSON.stringify(data, null, 2));
        } else {
          log("❌ No data found for key: " + key);
        }
      }

      function testClear() {
        const matchId = "test-match-123";
        const key = `golf_league_draft_${matchId}`;
        localStorage.removeItem(key);
        log("✅ Cleared key: " + key);
      }

      function testAll() {
        log("=== Starting LocalStorage Test ===");
        testSave();
        testLoad();
        testClear();
        testLoad();
        log("=== Test Complete ===");
      }

      // Auto-run test on load
      log("LocalStorage Test Page Loaded");
      log('Click "Test All" to run full test');
    </script>
  </body>
</html>
