<!doctype html>
<html>
  <head>
    <title>Schedule Fix Test</title>
  </head>
  <body>
    <h1>Test Schedule Generation</h1>
    <p>
      If the schedule generation is working, clicking the button below should
      open a confirmation dialog and then generate matches.
    </p>
    <button onclick="testGenerateWeek()">Test Generate Week</button>

    <script>
      // Mock showConfirm (simulating the base.html function)
      function showAlert(message, title = "Alert") {
        alert(title + ": " + message);
      }

      function showConfirm(message, title = "Please Confirm", onConfirm) {
        if (confirm(title + "\n\n" + message)) {
          if (onConfirm) onConfirm();
        }
      }

      async function testGenerateWeek() {
        const week = 1;
        const seasonId = "test123";

        showConfirm(
          `Generate schedule for Week ${week}? This will create matches based on current handicaps.`,
          "Generate Week Schedule",
          async () => {
            try {
              // Simulate API call (would be real in production)
              console.log(
                "Generating schedule for week " + week + ", season " + seasonId,
              );
              showAlert(`Generated 1 matches for Week ${week}`);
              // loadSchedule(); // would refresh in production
            } catch (error) {
              console.error("Error generating week schedule:", error);
              showAlert("Failed to generate schedule");
            }
          },
        );
      }
    </script>
  </body>
</html>
